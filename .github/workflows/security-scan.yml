name: CI Security Scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov and ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install checkov ansible-lint ansible

      - name: Install Ansible MySQL collection
        run: |
          ansible-galaxy collection install community.mysql

      - name: Terraform format check
        working-directory: ./terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ./terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ./terraform
        run: terraform validate

      - name: Run Checkov
        run: checkov -d ./terraform || true

            - name: Show ansible-lint version
        run: ansible-lint --version

      - name: Show playbooks with line numbers
        run: |
          echo "===== frontend.yml ====="
          nl -ba ansible/frontend.yml
          echo "===== database.yml ====="
          nl -ba ansible/database.yml

      - name: Run ansible-lint with line numbers
        run: ansible-lint ./ansible -p