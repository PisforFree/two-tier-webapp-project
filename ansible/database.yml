---
- name: Configure database server
  hosts: database
  become: true
  vars:
    db_name: twotierdb
    db_user: andrade72
    db_password: "(@6r73LwEs"

  tasks:
    - name: Refresh yum cache
      ansible.builtin.yum:
        update_cache: true

    - name: Install MariaDB server
      ansible.builtin.yum:
        name:
          - mariadb-server
          - python3-pip
        state: present

    - name: Install PyMySQL
      ansible.builtin.pip:
        name: PyMySQL
        state: present

    - name: Start and enable MariaDB
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: true

    - name: Create application database
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/lib/mysql/mysql.sock

    - name: Create application database user
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        host: "%"
        state: present
        login_unix_socket: /var/lib/mysql/mysql.sock
