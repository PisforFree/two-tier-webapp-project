---
- name: Configure frontend server
  hosts: frontend
  become: true

  tasks:
    - name: Refresh yum cache
      ansible.builtin.yum:
        update_cache: true

    - name: Install Apache and PHP packages
      ansible.builtin.yum:
        name:
          - httpd
          - php
          - php-mysqlnd
        state: present

    - name: Start and enable Apache
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Deploy application file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../app/index.php"
        dest: /var/www/html/index.php
        owner: apache
        group: apache
        mode: "0644"

